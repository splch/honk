name: Pages

# Build honk.elf, (re)build the QEMU-WASM emulator bundle (cached), assemble the
# static site, and deploy it to GitHub Pages. The recorded-boot replay always ships;
# the live in-browser emulator ships once the WASM bundle has been built and cached.
#
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Pin to a commit SHA for reproducible emulator builds.
  QEMU_WASM_REF: master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Cache the patched Embedded Go toolchain
        uses: actions/cache@v5
        with:
          path: .toolchain
          key: honk-toolchain-${{ runner.os }}-${{ hashFiles('toolchain/**', 'go.mod') }}

      - name: Build the kernel
        run: |
          make toolchain   # idempotent: a no-op when restored from cache
          make kernel

      - name: Restore the QEMU-WASM bundle
        id: qemucache
        uses: actions/cache/restore@v4
        with:
          path: web/vendor/qemu
          key: honk-qemuwasm-${{ runner.os }}-${{ hashFiles('web/build-qemu-wasm.sh') }}-${{ env.QEMU_WASM_REF }}

      - name: Build the QEMU-WASM bundle (first run only; non-blocking)
        if: steps.qemucache.outputs.cache-hit != 'true'
        run: bash web/build-qemu-wasm.sh || echo "::warning::QEMU-WASM build failed; deploying the replay-only site"

      - name: Save the QEMU-WASM bundle
        if: steps.qemucache.outputs.cache-hit != 'true' && hashFiles('web/vendor/qemu/qemu-system-riscv64.wasm') != ''
        uses: actions/cache/save@v4
        with:
          path: web/vendor/qemu
          key: honk-qemuwasm-${{ runner.os }}-${{ hashFiles('web/build-qemu-wasm.sh') }}-${{ env.QEMU_WASM_REF }}

      - name: Assemble the site
        run: make web

      - name: End-to-end test (only when the live bundle is present)
        if: hashFiles('web/vendor/qemu/qemu-system-riscv64.wasm') != ''
        continue-on-error: true
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i -D @playwright/test
          npx playwright install --with-deps chromium
          npx playwright test web/test/e2e.spec.mjs

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
